<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>لوحة متصلة</title>
<style>
body{font-family:sans-serif;background:#111;color:#fff;padding:20px}
button{padding:10px;margin:5px}
</style>
</head>
<body>

<h2>الحالة: <span id="status">...</span></h2>

<textarea id="msg" placeholder="اكتب رسالة"></textarea><br>

<button onclick="send()">إرسال</button>
<button onclick="toggleMute()">كتم الصوت</button>
<button onclick="upload()">رفع صورة</button>

<div id="messages"></div>

<script>
let muted = false
const API = "http://127.0.0.1:5000"

async function heartbeat(){
  await fetch(API+"/heartbeat",{method:"POST"})
}

async function load(){
  let res = await fetch(API+"/status")
  let data = await res.json()

  document.getElementById("status").innerText =
    data.online ? "متصل" : "غير متصل"

  let box = document.getElementById("messages")
  box.innerHTML = data.messages.map(m=>"<p>"+m.text+"</p>").join("")
}

async function send(){
  let text = document.getElementById("msg").value
  await fetch(API+"/message",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({text})
  })
}

function toggleMute(){
  muted = !muted
  alert(muted ? "تم كتم الصوت" : "تم تشغيل الصوت")
}

function upload(){
  alert("اختر صورة من جهازك (بدل تصوير الشاشة)")
}

setInterval(heartbeat,3000)
setInterval(load,3000)
</script>

</body>
</html>
